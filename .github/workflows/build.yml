name: Verify

env:
  NODE_VERSION: 24
  PNPM_VERSION: 9.15.4
  PNPM_STORE_DIR: .pnpm-store

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - next
      - release/*
  pull_request:
    branches:
      - main
      - next
      - release/*

jobs:
  install-node-dependencies:
    name: Install node dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure pnpm store
        run: pnpm config set store-dir ${{ github.workspace }}/${{ env.PNPM_STORE_DIR }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Pack dependency artifacts
        run: |
          tar -czf /tmp/pnpm-store.tar.gz ${{ env.PNPM_STORE_DIR }}
          tar -czf /tmp/playwright-cache.tar.gz -C "$HOME/.cache" ms-playwright

      - name: Upload dependency artifacts
        uses: actions/upload-artifact@v7
        with:
          name: node-dependencies
          path: |
            /tmp/pnpm-store.tar.gz
            /tmp/playwright-cache.tar.gz
          retention-days: 1

  check-linting-formatting:
    name: Check linting & formatting
    runs-on: ubuntu-latest
    needs: build-packages
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure pnpm store
        run: pnpm config set store-dir ${{ github.workspace }}/${{ env.PNPM_STORE_DIR }}

      - name: Download dependency artifacts
        uses: actions/download-artifact@v8
        with:
          name: node-dependencies
          path: /tmp/node-dependencies

      - name: Restore pnpm store
        run: tar -xzf /tmp/node-dependencies/pnpm-store.tar.gz

      - name: Restore dependencies
        run: pnpm install --offline --frozen-lockfile --strict-peer-dependencies

      - name: Run linting and formatting checks
        run: pnpm run lint

  build-packages:
    name: Build packages
    runs-on: ubuntu-latest
    needs: install-node-dependencies
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure pnpm store
        run: pnpm config set store-dir ${{ github.workspace }}/${{ env.PNPM_STORE_DIR }}

      - name: Download dependency artifacts
        uses: actions/download-artifact@v8
        with:
          name: node-dependencies
          path: /tmp/node-dependencies

      - name: Restore pnpm store
        run: tar -xzf /tmp/node-dependencies/pnpm-store.tar.gz

      - name: Restore dependencies
        run: pnpm install --offline --frozen-lockfile --strict-peer-dependencies

      - name: Build packages
        run: pnpm run build && pnpm run build:demos

      - name: Pack build artifacts
        run: tar -czf /tmp/build-output.tar.gz packages/*/dist packages-deprecated/*/dist demos/dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: /tmp/build-output.tar.gz
          retention-days: 1

  run-unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: build-packages
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure pnpm store
        run: pnpm config set store-dir ${{ github.workspace }}/${{ env.PNPM_STORE_DIR }}

      - name: Download dependency artifacts
        uses: actions/download-artifact@v8
        with:
          name: node-dependencies
          path: /tmp/node-dependencies

      - name: Restore pnpm store
        run: tar -xzf /tmp/node-dependencies/pnpm-store.tar.gz

      - name: Restore dependencies
        run: pnpm install --offline --frozen-lockfile --strict-peer-dependencies

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: /tmp/build-output

      - name: Restore build output
        run: tar -xzf /tmp/build-output/build-output.tar.gz

      - name: Run unit tests
        run: pnpm run test:unit

  run-e2e-tests:
    name: Run e2e tests
    runs-on: ubuntu-latest
    needs: build-packages
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        test-spec:
          - { id: integration, name: Integration, spec: 'tests/e2e' }
          - { id: demos-commands, name: 'Demos/Commands', spec: 'demos/src/Commands' }
          - { id: demos-examples, name: 'Demos/Examples', spec: 'demos/src/Examples' }
          - { id: demos-experiments, name: 'Demos/Experiments', spec: 'demos/src/Experiments' }
          - { id: demos-extensions, name: 'Demos/Extensions', spec: 'demos/src/Extensions' }
          - { id: demos-guidecontent, name: 'Demos/GuideContent', spec: 'demos/src/GuideContent' }
          - { id: demos-guidegettingstarted, name: 'Demos/GuideGettingStarted', spec: 'demos/src/GuideGettingStarted' }
          - { id: demos-guidemarkviews, name: 'Demos/GuideMarkViews', spec: 'demos/src/GuideMarkViews' }
          - { id: demos-marks, name: 'Demos/Marks', spec: 'demos/src/Marks' }
          - { id: demos-nodes, name: 'Demos/Nodes', spec: 'demos/src/Nodes' }
          - { id: demos-demos, name: 'Demos/Demos', spec: 'demos/src/Demos' }

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure pnpm store
        run: pnpm config set store-dir ${{ github.workspace }}/${{ env.PNPM_STORE_DIR }}

      - name: Download dependency artifacts
        uses: actions/download-artifact@v8
        with:
          name: node-dependencies
          path: /tmp/node-dependencies

      - name: Restore pnpm store
        run: tar -xzf /tmp/node-dependencies/pnpm-store.tar.gz

      - name: Restore dependencies
        run: pnpm install --offline --frozen-lockfile --strict-peer-dependencies

      - name: Restore Playwright browsers
        run: mkdir -p "$HOME/.cache" && tar -xzf /tmp/node-dependencies/playwright-cache.tar.gz -C "$HOME/.cache"

      - name: Install Playwright OS dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: /tmp/build-output

      - name: Restore build output
        run: tar -xzf /tmp/build-output/build-output.tar.gz

      - name: Test ${{ matrix.test-spec.name }}
        env:
          CI: '1'
          PLAYWRIGHT_USE_BUILD: '1'
        run: pnpm exec playwright test ${{ matrix.test-spec.spec }} --project=chromium

      - name: Upload Playwright report (on failure only)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.test-spec.id }}
          path: playwright-report
          retention-days: 7

      - name: Upload Playwright test results (on failure only)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-test-results-${{ matrix.test-spec.id }}
          path: test-results
          retention-days: 7
