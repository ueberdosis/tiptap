<div class="control-group">
  <div class="button-group">
    <button id="run">Create + destroy editors</button>
    <button id="gc">Force GC + report</button>
    <button id="reset">Reset doc</button>
  </div>
  <label><input type="number" id="count" value="20" min="1" style="width: 4rem" /> editors per run</label>
  <label><input type="checkbox" id="fixA" /> Fix A: delete undoManager.restore on destroy</label>
  <label><input type="checkbox" id="fixB" /> Fix B: remove upstream doc 'destroy' listener on destroy</label>
  <label><input type="checkbox" id="caret" /> Also load CollaborationCaret (mock provider)</label>
  <label><input type="checkbox" id="nocollab" /> Control: NO collaboration (plain editor — should always be collected)</label>
</div>

<div class="output-group">
  <strong>Stats</strong>
  <div>Editors created: <span id="created">0</span></div>
  <div>Editors collected (GC'd): <span id="collected">0</span></div>
  <div>Still alive (uncollected WeakRefs): <span id="alive">0</span></div>
  <div>Doc 'destroy' listeners still on shared doc: <span id="docListeners">0</span></div>
</div>

<pre id="log" class="output-group" style="max-height: 240px; overflow: auto; white-space: pre-wrap"></pre>

<!-- editors are mounted into detached containers we throw away, so the only refs we keep are WeakRefs -->
<div id="stage" style="position: absolute; left: -99999px; top: 0"></div>

<script type="module">
  import { Editor } from '@tiptap/core'
  import Collaboration from '@tiptap/extension-collaboration'
  import CollaborationCaret from '@tiptap/extension-collaboration-caret'
  import Document from '@tiptap/extension-document'
  import Paragraph from '@tiptap/extension-paragraph'
  import Text from '@tiptap/extension-text'
  import * as Y from 'yjs'

  const $ = id => document.getElementById(id)
  const logEl = $('log')
  const log = (...args) => {
    logEl.textContent += args.join(' ') + '\n'
    logEl.scrollTop = logEl.scrollHeight
  }

  // One shared doc for the whole session — this stands in for "the provider's
  // document that outlives individual editors".
  let ydoc = new Y.Doc()

  let created = 0
  let collected = 0
  const weakRefs = []
  const registry = new FinalizationRegistry(id => {
    collected += 1
    render()
    log(`✓ collected editor #${id}`)
  })

  const docDestroyListenerCount = () => {
    // lib0 ObservableV2 stores listeners in a Map<eventName, Set<fn>>
    const observers = ydoc._observers && ydoc._observers.get('destroy')
    return observers ? observers.size : 0
  }

  const render = () => {
    $('created').textContent = String(created)
    $('collected').textContent = String(collected)
    $('alive').textContent = String(weakRefs.filter(r => r.deref() !== undefined).length)
    $('docListeners').textContent = String(docDestroyListenerCount())
  }

  // Minimal awareness mock for CollaborationCaret (no network needed).
  const makeMockProvider = () => {
    const listeners = new Set()
    return {
      awareness: {
        states: new Map(),
        getStates: () => new Map(),
        getLocalState: () => ({}),
        setLocalState: () => {},
        setLocalStateField: () => {},
        on: (event, fn) => {
          if (event === 'update') listeners.add(fn)
        },
        off: (event, fn) => {
          if (event === 'update') listeners.delete(fn)
        },
      },
    }
  }

  const getUndoManager = editor => {
    for (const plugin of editor.state.plugins) {
      const state = plugin.getState(editor.state)
      if (state && state.undoManager) return state.undoManager
    }
    return null
  }

  const spawnAndDestroy = id => {
    const el = document.createElement('div')
    $('stage').appendChild(el)

    const noCollab = $('nocollab').checked
    const extensions = [Document, Paragraph, Text]
    if (!noCollab) {
      extensions.push(Collaboration.configure({ document: ydoc }))
      if ($('caret').checked) {
        extensions.push(CollaborationCaret.configure({
          provider: makeMockProvider(),
          user: { name: `User ${id}`, color: '#ff0000' },
        }))
      }
    }

    // Snapshot doc 'destroy' listeners BEFORE creation — the UndoManager adds its
    // never-removed listener during editor construction, so the diff after
    // creation identifies exactly the listener we want to remove on the fix path.
    const beforeCreateListeners = new Set(ydoc._observers.get('destroy') ?? [])

    const editor = new Editor({ element: el, extensions })

    // Make an edit so the undo stack + binding mapping get populated — this is
    // what the leaking listeners close over.
    editor.commands.insertContent(`<p>edit from editor ${id} — ${'lorem '.repeat(20)}</p>`)

    const undoManager = getUndoManager(editor)

    // Track GC of THIS editor object.
    registry.register(editor, id)
    weakRefs.push(new WeakRef(editor))
    created += 1

    editor.destroy()

    if ($('fixA').checked) {
      // A) drop the captured _observers Map that pins the editor via restore closure
      if (undoManager) delete undoManager.restore
    }
    if ($('fixB').checked) {
      // B) remove the upstream Yjs doc 'destroy' listener that pins the undoManager
      const after = ydoc._observers.get('destroy') ?? new Set()
      for (const fn of after) {
        if (beforeCreateListeners.has(fn)) continue
        ydoc.off('destroy', fn)
      }
    }

    // Throw away the DOM container; we hold only WeakRefs from here on.
    el.remove()
  }

  $('run').addEventListener('click', () => {
    const n = Math.max(1, Number($('count').value) || 1)
    for (let i = 0; i < n; i += 1) {
      spawnAndDestroy(created + 1)
    }
    render()
    log(`— created ${n} editors (fixA=${$('fixA').checked}, fixB=${$('fixB').checked}, caret=${$('caret').checked}). Now click "Force GC + report".`)
  })

  $('gc').addEventListener('click', async () => {
    if (typeof window.gc !== 'function') {
      log('⚠ window.gc() unavailable. Either launch Chrome with --js-flags="--expose-gc",')
      log('  or use DevTools → Memory → trash-can icon to force GC, then click this again.')
    } else {
      // Call repeatedly; FinalizationRegistry callbacks are async after collection.
      for (let i = 0; i < 5; i += 1) window.gc()
    }
    // Give the FinalizationRegistry a moment to fire.
    await new Promise(r => setTimeout(r, 300))
    render()
    const alive = weakRefs.filter(r => r.deref() !== undefined).length
    log(`Report: ${collected}/${created} collected, ${alive} still alive, ${docDestroyListenerCount()} doc 'destroy' listeners.`)
  })

  $('reset').addEventListener('click', () => {
    ydoc.destroy()
    ydoc = new Y.Doc()
    created = 0
    collected = 0
    weakRefs.length = 0
    logEl.textContent = ''
    render()
    log('— reset: fresh Y.Doc, counters cleared.')
  })

  // expose for manual poking in the console
  window.__leak = {
    get ydoc() { return ydoc },
    weakRefs,
    docDestroyListenerCount,
  }

  render()
  log('Ready. Suggested test:')
  log('1) fix OFF → "Create + destroy editors" → "Force GC + report". Expect: most editors STILL ALIVE.')
  log('2) Reset, fix ON → same steps. Expect: all/most editors COLLECTED, doc listeners back to 0.')
  log('Tip: run Chrome with --js-flags="--expose-gc" so the GC button works directly.')
</script>
